<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagen dinâmica</h1>
    <p>tente abrir este site em vários dispositivos diferentes ou simplesmente aumentee ou diminua o tamannho do seu navegador.</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexivel">
    </picture>

    <h1>Reproduzindo audio</h1>
    <p>Vamos aprender a reproduzir um audio em HTML5</p>
    <audio src="midia/Intergalactic - Alex Jones _ Xander Jones.mp3" controls></audio>
    <!--- MP3 WAV OGG-->

    <audio preload="metadata" controls loop>
        <source src="midia/The Army Song (aka The Army Goes Rolling Along) - The U.S. Army Band.mp3" type="audio/mpeg">
        <source src="midia/The Army Song (aka The Army Goes Rolling Along) - The U.S. Army Band.ogg" type="audio/ogg">
        <source src="midia/The Army Song (aka The Army Goes Rolling Along) - The U.S. Army Band.wav" type="audio/wav">
        <p>Infelizmente seu navegador não consegue reproduzir audios. <a href="midia/The Army Song (aka The Army Goes Rolling Along) - The U.S. Army Band.mp3"> Clique aqui para baixar o arquivo MP3</a></p>
    </audio>
    
</body>
</html>
